<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTAE Robot Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-laptop"></i>
                OTAE Robot Shop
            </a>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> สินค้า</a></li>
                <li><a href="works.html"><i class="fas fa-briefcase"></i> ผลงาน</a></li>
                <li><a href="contact.html"><i class="fas fa-phone"></i> ติดต่อ</a></li>
                <li>
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" style="display:none;">0</span>
                    </a>
                </li>
                <li><a href="login.html"><i class="fas fa-user"></i> เข้าสู่ระบบ</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" id="productDetail">
        <div class="detail-container">
            <div class="image-gallery">
                <img id="mainImage" class="image-gallery-main" src="" alt="">
                <div class="image-gallery-thumbnails" id="thumbnails"></div>
            </div>
            <div class="detail-info">
                <h2 id="productName">ชื่อสินค้า</h2>
                <div class="detail-price" id="productPrice">฿0</div>
                <div style="margin:1rem 0;">
                    <span style="background:#f8f9fa; padding:0.3rem 1rem; border-radius:20px;">
                        <i class="fas fa-shopping-bag"></i> ขายแล้ว <span id="productSales">0</span> ชิ้น
                    </span>
                </div>
                <p class="detail-desc" id="productDescription">รายละเอียดสินค้า</p>
                <div style="display:flex; gap:1rem; margin-top:2rem;">
                    <button class="btn btn-primary" id="addToCartBtn" style="flex:1;">
                        <i class="fas fa-cart-plus"></i> เพิ่มลงตะกร้า
                    </button>
                    <button class="btn btn-success" id="buyNowBtn" style="flex:1;">
                        <i class="fas fa-shopping-cart"></i> สั่งซื้อทันที
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (productId) {
                db.collection('products').doc(productId).get().then(doc => {
                    if (doc.exists) {
                        const product = doc.data();
                        document.getElementById('productName').textContent = product.name;
                        document.getElementById('productPrice').textContent = `฿${product.price.toLocaleString()}`;
                        document.getElementById('productDescription').textContent = product.description;
                        document.getElementById('productSales').textContent = product.sales || 0;
                        
                        if (product.images && product.images.length > 0) {
                            // Set main image
                            document.getElementById('mainImage').src = product.images[0];
                            
                            // Create thumbnails
                            const thumbnails = document.getElementById('thumbnails');
                            product.images.forEach((img, index) => {
                                const thumb = document.createElement('img');
                                thumb.src = img;
                                thumb.alt = `รูปที่ ${index + 1}`;
                                if (index === 0) thumb.classList.add('active');
                                
                                thumb.onclick = () => {
                                    document.getElementById('mainImage').src = img;
                                    document.querySelectorAll('#thumbnails img').forEach(t => t.classList.remove('active'));
                                    thumb.classList.add('active');
                                };
                                
                                thumbnails.appendChild(thumb);
                            });
                        }
                        
                        document.getElementById('addToCartBtn').onclick = () => {
                            addToCart(productId);
                        };
                        
                        document.getElementById('buyNowBtn').onclick = () => {
                            addToCart(productId);
                            window.location.href = 'order.html';
                        };
                    }
                });
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
